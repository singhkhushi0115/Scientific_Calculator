<!DOCTYPE html>
<html>

<head>
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="calculator">
    <div class="top-controls">

        <input type="text" id="display" readonly>

        <div class="angle-mode">

            <button id="degBtn" onclick="setDegreeMode()">
                Deg
            </button>

            <button id="radBtn" onclick="setRadianMode()">
                Rad
            </button>

        </div>

    </div>
    
    <div class="mode-selector">

        <button
            id="normalModeBtn"
            onclick="showNormalMode()"
        >
            Normal 
        </button>

        <button
            id="trigModeBtn"
            onclick="showTrigMode()"
        >
            Trigonometric 
        </button>

    </div>

    <div id="normalMode">
        <div class="buttons">


            <!-- Row 1 -->
            <button onclick="callNumberAPI('log')">log</button>
            <button onclick="callNumberAPI('ln')">ln</button> 
            <button onclick="callNumberAPI('square')">x²</button> 
            <button onclick="callNumberAPI('cube')">x³</button> 
            <button onclick="calculatePower()">xʸ</button>

            <!-- Row 2 -->
            <button onclick="callNumberAPI('sqrt')">√x</button>          
            <button onclick="callNumberAPI('cube-root')">³√x</button> 
            <button onclick="calculateNthRoot()">y√x</button> 
            <button onclick="callNumberAPI('reciprocal')">1/x</button> 
            <button onclick="callNumberAPI('exp')">eˣ</button>

            <!-- Row 3 -->
            <button onclick="callNumberAPI('power10')">10ˣ</button> 
            <button onclick="callNumberAPI('factorial')">n!</button> 
            <button onclick="appendPi()">π</button> 
            <button onclick="appendE()">e</button> 
            <button onclick="calculateEXP()">EXP</button>

            <!-- Row 4 -->
            <button onclick="memoryAdd()">M+</button> 
            <button onclick="memorySubtract()">M-</button> 
            <button onclick="memoryRecall()">MR</button> 
            <button onclick="useAns()">Ans</button> 
            <button onclick="backspace()">⌫</button>

            <!-- Row 5 -->
            <button onclick="appendValue('(')">(</button> 
            <button onclick="appendValue(')')">)</button> 
            <button onclick="callNumberAPI('percentage')" title="Divides by 100 (e.g. 50 → 0.5)">%</button> 
            <button onclick="clearDisplay()">C</button> 
            <button onclick="appendValue('/')">/</button>

            <!-- Row 6 -->
            <button onclick="appendValue('7')">7</button> 
            <button onclick="appendValue('8')">8</button> 
            <button onclick="appendValue('9')">9</button> 
            <button onclick="appendValue('*')">*</button> 
            <button onclick="appendValue('-')">-</button>

            <!-- Row 7 -->
            <button onclick="appendValue('4')">4</button> 
            <button onclick="appendValue('5')">5</button> 
            <button onclick="appendValue('6')">6</button> 
            <button onclick="appendValue('+')">+</button> 
            <button onclick="calculateResult()">=</button>

            <!-- Row 8 -->
            <button onclick="appendValue('1')">1</button> 
            <button onclick="appendValue('2')">2</button> 
            <button onclick="appendValue('3')">3</button>
            <button class="zero-btn" onclick="appendValue('0')">0</button>

            <!-- Row 9 -->
            <button onclick="appendValue('.')">.</button>
            <button onclick="memoryClear()">MC</button>

        </div>
</div>

<div id="trigModeContainer" style="display:none;">

    <div class="trig-actions">
        <button onclick="calculateTrigDirect()">
            Calculate Trig
        </button>

        <button onclick="calculateInverseTrigDirect()">
        Show Inverse
        </button>

    </div>


    <div class = "buttons">
        

        <button onclick="appendPi()">π</button> 
        <button onclick="backspace()">⌫</button> 
        <button onclick="clearDisplay()">C</button> 
        <button onclick="appendValue('(')">(</button> 
        <button onclick="appendValue(')')">)</button>

        <button onclick="appendValue('7')">7</button> 
        <button onclick="appendValue('8')">8</button> 
        <button onclick="appendValue('9')">9</button> 
        <button onclick="appendValue('/')">/</button> 
        <button onclick="appendValue('*')">*</button>

        <button onclick="appendValue('4')">4</button> 
        <button onclick="appendValue('5')">5</button> 
        <button onclick="appendValue('6')">6</button> 
        <button onclick="appendValue('-')">-</button> 
        <button onclick="calculateResult()">=</button>

        <button onclick="appendValue('1')">1</button> 
        <button onclick="appendValue('2')">2</button> 
        <button onclick="appendValue('3')">3</button> 
        <button onclick="appendValue('+')">+</button>

        <button class="zero-btn" onclick="appendValue('0')"> 0 </button>
        <button onclick="appendValue('.')">.</button>

    </div>

    <div id="trigResults"></div>


</div>

<script src="/static/script.js"></script>

</body>
</html>
